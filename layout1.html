<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body{
             font-family:  Arial, Helvetica, sans-serif;
        }
header{
background-color: rgb(81, 37, 37);
padding: 30px;
text-align:  center;
font-size: 35px;
color: rgb(12, 12, 12);
}
nav {
    float: left;
    width: 100%;
    height: 300px;
    background: #a19f9f;
    padding: 20px;
}
nav ul {
    list-style-type: none;
    padding: 0;
}

article {

    padding: 20px;
    width: 100%;
    background-color: #433232;
    height: 300px; }
    section ::after {
    content: "";
    display: table;
    clear: both;
}
footer {
    background-color: #777;
    padding: 10px;
    text-align:  center;
    color: rgb(0, 0, 0);
    @media (max-width: 600px) {
    nav, article {
     width: 100%;
     height: auto;
    }
 
    }
    </style>
</head>
<body>
<nav>
             <ul>
                  <li><a href="#">Hyderabad</a></li>
                  <li><a href="#">Uttar Pradesh</a></li>
                  <li><a href="#">Mumbai</a></li>
             </ul>
          </nav>
           <section>
          
         <article>
    <h1>Hyderabad</h1>
    <p>Hyderabad is Capital of Telangana </p>
    <h2>Uttar Pradesh</h2>
    <p>Lucknow is Capital of Uttar Pradesh </p>
    <h3>Mumbai</h3>
    <p>Mumbai is Capital of Maharastra </p>
            </article>
              </section>
        <footer>
            <p>footer example </p>
    </footer>
    
 




</body>
</html>
